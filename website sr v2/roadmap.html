<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Career Command | Career Pivot AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* PERFECT ALIGNMENT & GRID SYSTEM */
        .roadmap-grid { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 3rem;
            padding: 2rem 0;
        }
        
        .pillar-card { 
            @apply bg-white p-10 rounded-[4rem] border-t-8 shadow-2xl transition-all duration-500 flex flex-col h-full relative overflow-hidden;
            border-top-width: 12px;
        }
        .pillar-card:hover { @apply -translate-y-3 shadow-blue-200/50; }
        
        /* NODE ALIGNMENT */
        .step-node { @apply flex items-center gap-6 p-5 rounded-[2rem] transition-all border-l-4 border-slate-100 bg-slate-50/50 mb-4; }
        .step-node:hover { @apply bg-white translate-x-2 border-blue-400 shadow-md; }
        
        .phase-id { @apply w-12 h-12 rounded-full flex items-center justify-center text-white font-black text-xs shadow-lg flex-shrink-0; }
        .skill-name { @apply text-sm font-bold text-slate-800 leading-tight; }

        /* THEME PALETTE */
        .cyber-theme { border-top-color: #2563eb; } .cyber-theme .phase-id { @apply bg-blue-600; }
        .ai-theme { border-top-color: #9333ea; } .ai-theme .phase-id { @apply bg-purple-600; }
        .web-theme { border-top-color: #10b981; } .web-theme .phase-id { @apply bg-emerald-500; }
    </style>
</head>
<body class="bg-slate-50 pb-20" onload="renderRoadmaps()">
    <nav class="bg-white/90 backdrop-blur-md p-5 flex justify-between items-center sticky top-0 z-50 shadow-sm border-b border-slate-100">
        <div class="font-black text-2xl text-blue-600 tracking-tighter italic">CAREER PIVOT AI</div>
        <div class="flex space-x-8 font-bold text-[10px] text-slate-500 uppercase tracking-[0.3em]">
            <a href="home.html" class="hover:text-blue-600">Home</a>
            <a href="profile.html" class="hover:text-blue-600">Profile</a>
            <a href="roadmap.html" class="text-blue-600 border-b-2 border-blue-600">Roadmap</a>
            <a href="job.html" class="hover:text-blue-600">Jobs</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto mt-16 px-6">
        <header class="mb-16 text-center">
            <h1 class="text-5xl font-black text-slate-900 tracking-tighter">Your AI Learning Command Center</h1>
            <p id="userStatus" class="text-slate-400 font-bold text-sm mt-4 uppercase tracking-widest">Generating Specialized Paths...</p>
        </header>

        <div id="roadmapContainer" class="roadmap-grid">
            </div>
    </main>

    <script>
        const userID = localStorage.getItem('currentUser') || 'student1';
        const DB_KEY = `ULTIMATE_DB_${userID}`;

        function renderRoadmaps() {
            const data = JSON.parse(localStorage.getItem(DB_KEY)) || {};
            document.getElementById('userStatus').innerText = `Analyzing Cluster for: ${userID.toUpperCase()} (${data.role})`;

            const container = document.getElementById('roadmapContainer');
            let paths = [];
            let theme = "";

            // DOMAIN DATA WITH EXTERNAL COURSE LINKS
            if (userID === 'student1' || userID === 'employee1') {
                theme = "cyber-theme";
                paths = [
                    { role: "SOC Analyst", skills: ["Networking Protocol Mastery", "Traffic Analysis (Wireshark)", "SIEM Event Correlation", "Incident Response"], link: "https://www.udemy.com/course/certified-soc-analyst-training/" },
                    { role: "Penetration Tester", skills: ["Vulnerability Assessment (VPTA)", "Exploit Development", "Web App Hacking", "Red Team Ops"], link: "https://www.coursera.org/specializations/penetration-testing" },
                    { role: "Cloud Security", skills: ["IAM Policy Design", "AWS Security Hub", "Serverless Infrastructure", "Cloud Audit"], link: "https://learn.microsoft.com/en-us/training/paths/sc-900-describe-concepts-of-security-compliance-identity/" },
                    { role: "Digital Forensics", skills: ["Memory Dump Analysis", "Registry Forensics", "Malware Dissection", "Expert Reporting"], link: "https://www.udemy.com/course/computer-forensics-fundamentals/" }
                ];
                if(data.role === 'Employee') paths.push({ role: "Security Architect", skills: ["Risk Management", "ISO 27001 Implementation", "Budgeting", "Bridge to 45 LPA"], link: "https://www.isaca.org/credentialing/cism" });
            } 
            else if (userID === 'student2' || userID === 'employee2') {
                theme = "ai-theme";
                paths = [
                    { role: "ML Engineer", skills: ["Feature Engineering", "Regression & Classification", "Random Forest", "Productionization"], link: "https://www.udemy.com/course/machinelearning/" },
                    { role: "AI Researcher", skills: ["Calculus & Gradient Descent", "Deep Neural Networks", "Transformers", "Attention Mechanisms"], link: "https://www.deeplearning.ai/" },
                    { role: "Computer Vision", skills: ["OpenCV Processing", "YOLO v10 Detection", "Face Recognition", "Spatial Tracking"], link: "https://www.coursera.org/learn/introduction-computer-vision-watson-opencv" },
                    { role: "NLP Specialist", skills: ["Sentiment Engines", "LLM Tuning", "Vector Search (RAG)", "Semantic Understanding"], link: "https://www.udemy.com/course/natural-language-processing-watson-python/" }
                ];
                if(data.role === 'Employee') paths.push({ role: "Senior AI Strategist", skills: ["Distributed Training", "AI Ethics", "Multi-modal Design", "Bridge to 60 LPA"], link: "https://www.coursera.org/specializations/ai-strategy-leadership" });
            } 
            else if (userID === 'student3') {
                theme = "web-theme";
                paths = [
                    { role: "Full Stack Developer", skills: ["Frontend State", "Backend Auth (JWT)", "NoSQL Sharding", "API Lifecycle"], link: "https://www.udemy.com/course/the-complete-web-development-bootcamp/" },
                    { role: "UX UI Architect", skills: ["Journey Mapping", "Tailwind Optimization", "Accessibility (WCAG)", "Design Systems"], link: "https://www.coursera.org/google-ux-design" },
                    { role: "DevOps Pro", skills: ["Docker Containerization", "Kubernetes", "CI/CD Pipelines", "Terraform Cloud"], link: "https://www.udemy.com/course/learn-devops-kubernetes-terraform-docker-ansible/" },
                    { role: "Systems Engineer", skills: ["Redis Caching", "Message Queues", "Microservices", "PostgreSQL Advanced"], link: "https://www.coursera.org/specializations/software-design-architecture" }
                ];
            }

            container.innerHTML = paths.map(p => `
                <div class="pillar-card ${theme}">
                    <div class="flex justify-between items-start mb-8">
                        <h3 class="text-3xl font-black text-slate-800 leading-[1.1] pr-4">${p.role}</h3>
                        <div class="bg-slate-100 p-3 rounded-2xl"><i class="fas fa-project-diagram text-slate-400"></i></div>
                    </div>

                    <div class="flex-grow">
                        ${p.skills.map((skill, i) => `
                            <div class="step-node">
                                <div class="phase-id">${i+1}</div>
                                <div class="flex flex-col">
                                    <span class="text-[9px] font-black uppercase text-slate-400 tracking-widest">Skill Phase</span>
                                    <span class="skill-name">${skill}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <button onclick="window.open('${p.link}', '_blank')" 
                            class="w-full mt-10 bg-slate-900 text-white py-5 rounded-[2.2rem] font-black text-[10px] uppercase tracking-widest hover:bg-blue-600 transition shadow-xl transform active:scale-95">
                        Explore Specialized Modules <i class="fas fa-external-link-alt ml-2"></i>
                    </button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
